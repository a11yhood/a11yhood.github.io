<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>a11yhood - Accessible Product Reviews</title>
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter&family=Noto+Serif&family=JetBrains+Mono&display=swap">
    
    <!-- Single Page Apps for GitHub Pages -->
    <!-- Handle redirects from 404.html for client-side routing -->
    <script>
      (function(l) {
        function decodePayload(value) {
          if (!value) return '';
          try {
            return decodeURIComponent(value);
          } catch (_e) {
            return value;
          }
        }

        if (l.search[1] === '/' ) {
          var q = l.search.slice(1).split('&');
          var route = decodePayload(q[0].slice(1));
          var query = decodePayload(q.slice(1).join('&'));
          var basePath = l.pathname.replace(/\/$/, '');

          // A query string starting with '/' indicates malformed redirect data
          // (e.g. '?/some-route&%2F...'); drop it to prevent URL growth loops.
          if (query.charAt(0) === '/') {
            query = '';
          }

          window.history.replaceState(null, null,
              basePath + (route ? '/' + route : '/') + (query ? '?' + query : '') + l.hash
          );
        }
      }(window.location))
    </script>
</head>

<body>
    <div id="root">
      <!-- Loading placeholder – replaced by React once it hydrates.
           Provides the required <main> landmark so axe/screen readers always
           see a main region, even in the brief window before JS runs. -->
      <main aria-label="Loading a11yhood">
        <p style="position:absolute;width:1px;height:1px;padding:0;margin:-1px;overflow:hidden;clip:rect(0,0,0,0);white-space:nowrap;border-width:0">Loading…</p>
      </main>
    </div>
    <script type="module" src="/src/main.tsx"></script>
</body>

</html>
