<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>a11yhood - Accessible Product Reviews</title>
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter&family=Noto+Serif&family=JetBrains+Mono&display=swap">
    
    <!-- Single Page Apps for GitHub Pages -->
    <!-- Handle redirects from 404.html for client-side routing -->
    <script>
      (function(l) {
        function decodePayload(value) {
          if (!value) return '';
          try {
            return decodeURIComponent(value);
          } catch (_e) {
            return value;
          }
        }

        if (l.search[1] === '/' ) {
          var q = l.search.slice(1).split('&');
          // Route segment was encodeURIComponent'd by 404.html; decode it back.
          var route = decodePayload(q[0].slice(1));
          // Query string was NOT double-encoded by 404.html (since v0.2.6+), so
          // pass it through as-is.  Decoding it here would turn %20→space etc.
          // and produce an invalid URL after history.replaceState.
          var query = q.slice(1).join('&');
          var basePath = l.pathname.replace(/\/$/, '');

          // A query string starting with '/' or '%2F' indicates malformed
          // redirect data; drop it to prevent URL growth loops.
          if (query.startsWith('/') || query.slice(0, 3).toLowerCase() === '%2f') {
            query = '';
          }

          window.history.replaceState(null, null,
              basePath + (route ? '/' + route : '/') + (query ? '?' + query : '') + l.hash
          );
        }
      }(window.location))
    </script>
</head>

<body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
</body>

</html>
