name: Full Backend Test (Comment Trigger)

on:
  issue_comment:
    types: [created]

permissions:
  contents: read
  actions: write
  issues: write
  pull-requests: write

jobs:
  dispatch:
    if: ${{ github.event.issue.pull_request != null && startsWith(github.event.comment.body, '/run-full-backend') && (github.event.comment.author_association == 'OWNER' || github.event.comment.author_association == 'MEMBER' || github.event.comment.author_association == 'COLLABORATOR') }}
    runs-on: ubuntu-latest
    steps:
      - name: Dispatch full backend workflow on PR merge ref
        uses: actions/github-script@v7
        with:
          github-token: ${{ github.token }}
          script: |
            const prNumber = context.payload.issue.number;
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const triggerRef = `refs/pull/${prNumber}/merge`;
            const workflowFile = 'backend-tests.yml';
            const defaultRef = context.payload.repository.default_branch;

            await github.rest.actions.createWorkflowDispatch({
              owner,
              repo,
              workflow_id: workflowFile,
              ref: defaultRef,
              inputs: {
                ref: triggerRef,
              },
            });

            await github.rest.issues.createComment({
              owner,
              repo,
              issue_number: prNumber,
              body: `Dispatched full backend suite for ${triggerRef}.`,
            });