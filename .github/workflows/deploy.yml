name: Deploy to GitHub Pages

on:
  # Only deploy production when a version tag is pushed (e.g. v1.2.3).
  # This acts as a deliberate quality gate: you create the tag after
  # verifying the build is ready for production.
  push:
    tags:
      - 'v*'
  # Allow manual re-deploys (e.g. after environment config changes).
  workflow_dispatch:

permissions:
  contents: write   # Needed to commit updated production build to gh-pages branch

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    environment: github-pages
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: |
          npm ci
          npm install --no-save @rollup/rollup-linux-x64-gnu @swc/core-linux-x64-gnu

      - name: Run tests
        env:
          CI: true
        run: npm run test:run

      - name: Build for GitHub Pages
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL }}
          VITE_DEV_MODE: ${{ secrets.VITE_DEV_MODE }}
          VITE_LOG_LEVEL: ${{ secrets.VITE_LOG_LEVEL }}
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
        run: npm run build:ghpages

      - name: Upload production build artifact
        uses: actions/upload-artifact@v5
        with:
          name: production-build
          path: dist/

  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout gh-pages branch
        uses: actions/checkout@v5
        with:
          ref: gh-pages
          fetch-depth: 1

      - name: Download production build
        uses: actions/download-artifact@v5
        with:
          name: production-build
          path: ${{ runner.temp }}/new-production/

      - name: Debug downloaded production artifact
        run: |
          echo "Downloaded artifact layout (top 3 levels):"
          find "${RUNNER_TEMP}/new-production" -maxdepth 3 -print | sort

      # Replace all root content with the new production build while preserving
      # preview subdirectories (legacy draft/ and current pr-preview/).
      - name: Merge production build into gh-pages root
        run: |
          ARTIFACT_ROOT="${RUNNER_TEMP}/new-production"

          if [ -d "${ARTIFACT_ROOT}/dist" ]; then
            BUILD_SOURCE="${ARTIFACT_ROOT}/dist/"
          else
            BUILD_SOURCE="${ARTIFACT_ROOT}/"
          fi

          echo "Selected BUILD_SOURCE=${BUILD_SOURCE}"

          # Guardrail: never deploy a source-style index that references
          # /src/main.tsx. A production Vite build should reference hashed
          # files under /assets.
          if [ ! -f "${BUILD_SOURCE}index.html" ]; then
            echo "Build artifact is missing index.html at ${BUILD_SOURCE}index.html"
            exit 1
          fi
          if grep -q 'src="/src/main.tsx"' "${BUILD_SOURCE}index.html"; then
            echo "Refusing to deploy non-built index.html (contains /src/main.tsx)."
            exit 1
          fi
          if [ ! -d "${BUILD_SOURCE}assets" ]; then
            echo "Build artifact is missing assets/ directory at ${BUILD_SOURCE}assets"
            exit 1
          fi

          rsync -av --delete \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='draft' \
            --exclude='pr-preview' \
            --exclude='new-production' \
            "$BUILD_SOURCE" . || rc=$?
          if [ "${rc:-0}" -ne 0 ] && [ "${rc:-0}" -ne 24 ]; then
            echo "rsync failed with unexpected exit code ${rc}"
            exit "$rc"
          fi

          # Post-copy sanity check on gh-pages root before commit.
          if [ ! -d assets ]; then
            echo "Post-merge validation failed: gh-pages root has no assets/"
            exit 1
          fi
          if grep -q 'src="/src/main.tsx"' index.html; then
            echo "Post-merge validation failed: index.html still references /src/main.tsx"
            exit 1
          fi

          rm -rf "${ARTIFACT_ROOT}"

      # Committing to gh-pages triggers pages-deploy.yml which runs from the
      # gh-pages branch context (allowed by github-pages environment rules)
      # and does the actual actions/deploy-pages call.
      - name: Commit updated production to gh-pages
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "Nothing to commit, production is already up to date"
          else
            git commit -m "Deploy production ${{ github.ref_name }}"
            git push
          fi
