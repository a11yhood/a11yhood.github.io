name: Deploy to GitHub Pages

on:
  # Only deploy production when a version tag is pushed (e.g. v1.2.3).
  # This acts as a deliberate quality gate: you create the tag after
  # verifying the build is ready for production.
  push:
    tags:
      - 'v*'
  # Allow manual re-deploys (e.g. after environment config changes).
  workflow_dispatch:

permissions:
  contents: write   # Needed to commit updated production build to gh-pages branch
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: |
          npm ci
          npm install --no-save @rollup/rollup-linux-x64-gnu @swc/core-linux-x64-gnu

      - name: Run tests
        env:
          CI: true
        run: npm run test:run

      - name: Build for GitHub Pages
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL }}
          VITE_DEV_MODE: ${{ secrets.VITE_DEV_MODE }}
          VITE_ENV: ${{ secrets.VITE_ENV }}
          VITE_LOG_LEVEL: ${{ secrets.VITE_LOG_LEVEL }}
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
        run: npm run build:ghpages

      - name: Upload production build artifact
        uses: actions/upload-artifact@v4
        with:
          name: production-build
          path: dist/

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout gh-pages branch
        uses: actions/checkout@v4
        with:
          ref: gh-pages
          fetch-depth: 1

      - name: Download production build
        uses: actions/download-artifact@v4
        with:
          name: production-build
          path: new-production/

      # Replace all root content with the new production build while preserving
      # the draft/ subdirectory (which holds active PR previews).
      - name: Merge production build into gh-pages root
        run: |
          rsync -av --delete \
            --exclude='.git' \
            --exclude='draft' \
            new-production/ .
          rm -rf new-production/

      - name: Commit updated production to gh-pages
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "Nothing to commit, production is already up to date"
          else
            git commit -m "Deploy production ${{ github.ref_name }}"
            git push
          fi

      # Upload the entire gh-pages content (production root + all PR previews)
      # as the single Pages artifact so both production and previews are served.
      - name: Upload merged site as Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
