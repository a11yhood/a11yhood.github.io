name: PR Preview

on:
  pull_request:
    types: [opened, synchronize, reopened, closed]

permissions:
  contents: read       # Read repository contents; pushes use PAT instead
  pull-requests: write # Post preview URL comment

jobs:
  lint:
    if: github.event.action != 'closed'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Run lint
        run: npm run lint

  build:
    if: github.event.action != 'closed'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - name: Install dependencies
        run: |
          npm ci
          npm install --no-save @rollup/rollup-linux-x64-gnu @swc/core-linux-x64-gnu
      - name: Run tests
        env:
          CI: true
        run: npm run test:run
      - name: Build for GitHub Pages
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL }}
          VITE_DEV_MODE: ${{ secrets.VITE_DEV_MODE }}
          VITE_ENV: ${{ secrets.VITE_ENV }}
          VITE_LOG_LEVEL: ${{ secrets.VITE_LOG_LEVEL }}
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          VITE_BASE_URL: /pr-preview/${{ github.event.number }}/
        run: npx tsc -b --noCheck && npx vite build

      - uses: actions/upload-artifact@v4
        with:
          name: vite-site-${{ github.event.number }}
          path: dist/

  deploy-preview:
    if: github.event.action != 'closed'
    needs: build
    runs-on: ubuntu-latest
    env:
      PREVIEW_URL: https://a11yhood.org/pr-preview/${{ github.event.number }}/
    steps:
      - name: Checkout gh-pages branch
        uses: actions/checkout@v4
        with:
          ref: gh-pages
          fetch-depth: 1
          persist-credentials: false

      # Remove stale files from a previous build of this same PR so renamed
      # or deleted assets don't linger.
      - name: Clear existing preview directory
        run: rm -rf pr-preview/${{ github.event.number }}

      - name: Download PR build
        uses: actions/download-artifact@v4
        with:
          name: vite-site-${{ github.event.number }}
          path: /tmp/pr-build/

      - name: Place build in preview directory
        run: |
          mkdir -p pr-preview/${{ github.event.number }}
          if [ -d /tmp/pr-build/dist ]; then
            cp -r /tmp/pr-build/dist/. pr-preview/${{ github.event.number }}/
          else
            cp -r /tmp/pr-build/. pr-preview/${{ github.event.number }}/
          fi

      # Committing to gh-pages triggers pages-deploy.yml which runs from the
      # gh-pages branch context (allowed by github-pages environment rules)
      # and does the actual actions/deploy-pages call.
      - name: Commit preview to gh-pages
        env:
          GH_PAGES_PUSH_PAT: ${{ secrets.GH_PAGES_PUSH_PAT }}
        run: |
          if [ -z "$GH_PAGES_PUSH_PAT" ]; then
            echo "Missing required secret: GH_PAGES_PUSH_PAT"
            exit 1
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git remote set-url origin "https://x-access-token:${GH_PAGES_PUSH_PAT}@github.com/${{ github.repository }}.git"
          git add -A pr-preview/${{ github.event.number }}/
          if git diff --cached --quiet; then
            echo "Nothing to commit, preview is already up to date"
          else
            git commit -m "Deploy PR #${{ github.event.number }} preview"
            git push
          fi

      - name: Add preview URL to workflow summary
        run: |
          echo "### PR Preview" >> "$GITHUB_STEP_SUMMARY"
          echo "${PREVIEW_URL}" >> "$GITHUB_STEP_SUMMARY"

      - name: Comment preview URL on PR
        uses: actions/github-script@v7
        with:
          script: |
            const marker = '<!-- pr-preview-url -->';
            const body = `${marker}\nPR preview is ready: ${process.env.PREVIEW_URL}`;
            const { owner, repo } = context.repo;
            const issue_number = context.issue.number;

            const comments = await github.paginate(github.rest.issues.listComments, {
              owner,
              repo,
              issue_number,
              per_page: 100,
            });

            const existing = comments.find(
              (comment) =>
                comment.user?.type === 'Bot' &&
                typeof comment.body === 'string' &&
                comment.body.includes(marker)
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number,
                body,
              });
            }

  # When a PR is closed (merged or abandoned), remove its preview from
  # gh-pages. The commit triggers pages-deploy.yml which redeploys Pages
  # from the gh-pages branch context (allowed by environment protection rules).
  cleanup:
    if: github.event.action == 'closed'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout gh-pages branch
        uses: actions/checkout@v4
        with:
          ref: gh-pages
          fetch-depth: 1
          persist-credentials: false

      - name: Remove PR preview directory
        env:
          GH_PAGES_PUSH_PAT: ${{ secrets.GH_PAGES_PUSH_PAT }}
        run: |
          if [ -z "$GH_PAGES_PUSH_PAT" ]; then
            echo "Missing required secret: GH_PAGES_PUSH_PAT"
            exit 1
          fi
          if [ -d "pr-preview/${{ github.event.number }}" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git remote set-url origin "https://x-access-token:${GH_PAGES_PUSH_PAT}@github.com/${{ github.repository }}.git"
            git rm -rf "pr-preview/${{ github.event.number }}/"
            git commit -m "Remove PR #${{ github.event.number }} preview"
            git push
          else
            echo "No preview directory found, nothing to remove"
          fi

  accessibility_scanner:
    name: A11y Preview Scan (PR)
    needs: deploy-preview
    runs-on: ubuntu-latest
    # accessibility-scanner requires a custom PAT; forked PRs cannot access repository secrets.
    if: ${{ github.event.action != 'closed' && github.event.pull_request.head.repo.fork == false }}
    steps:
      - uses: github/accessibility-scanner@v2
        with:
          urls: |
            https://a11yhood.org/pr-preview/${{ github.event.number }}/
          repository: a11yhood/a11yhood.github.io
          token: ${{ secrets.GH_TOKEN }}
          cache_key: a11yhood.org-pr-${{ github.event.number }}

