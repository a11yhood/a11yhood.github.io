name: PR Preview

on:
  pull_request:
    types: [opened, synchronize, reopened, closed]

concurrency:
  group: pr-preview-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Run lint
        run: npm run lint

  build:
    if: github.event.action != 'closed'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - run: npm install @rollup/rollup-linux-x64-gnu @swc/core-linux-x64-gnu
      - name: Run tests
        env:
          CI: true
        run: npm run test:run
      - name: Build for GitHub Pages
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL }}
          VITE_DEV_MODE: 'true'
          VITE_LOG_LEVEL: debug
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          VITE_BASE_URL: /pr-preview/${{ github.event.number }}/
        run: npx vite build

      - uses: actions/upload-artifact@v4
        with:
          name: vite-site-${{ github.event.number }}
          path: dist/

  deploy-preview:
    if: github.event.action != 'closed'
    needs: build
    runs-on: ubuntu-latest
    env:
      PREVIEW_URL: https://a11yhood.org/pr-preview/${{ github.event.number }}/
    steps:
      - uses: actions/checkout@v4
        with:
          ref: gh-pages
          fetch-depth: 0
      - uses: actions/download-artifact@v4
        with:
          name: vite-site-${{ github.event.number }}
          path: .preview-dist
      - name: Update preview files
        run: |
          rm -rf pr-preview/${{ github.event.number }}
          mkdir -p pr-preview/${{ github.event.number }}
          cp -R .preview-dist/. pr-preview/${{ github.event.number }}/
      - name: Commit and push preview
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A pr-preview/${{ github.event.number }}
          if git diff --cached --quiet; then
            echo "Nothing to commit, preview is already up to date"
          else
            git commit -m "Deploy PR #${{ github.event.number }} preview"
            git push origin HEAD:gh-pages
          fi

      - name: Add preview URL to workflow summary
        run: |
          echo "### PR Preview" >> "$GITHUB_STEP_SUMMARY"
          echo "${PREVIEW_URL}" >> "$GITHUB_STEP_SUMMARY"
      - name: Comment preview URL on PR
        uses: actions/github-script@v7
        with:
          script: |
            const marker = '<!-- pr-preview-url -->';
            const body = `${marker}\nPR preview is ready: ${process.env.PREVIEW_URL}`;
            const { owner, repo } = context.repo;
            const issue_number = context.issue.number;

            const comments = await github.paginate(github.rest.issues.listComments, {
              owner,
              repo,
              issue_number,
              per_page: 100,
            });

            const existing = comments.find(
              (comment) =>
                comment.user?.type === 'Bot' &&
                typeof comment.body === 'string' &&
                comment.body.includes(marker)
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number,
                body,
              });
            }

  cleanup-preview:
    if: github.event.action == 'closed'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: gh-pages
          fetch-depth: 0
      - name: Remove preview files
        run: rm -rf pr-preview/${{ github.event.number }}
      - name: Commit and push cleanup
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A pr-preview/${{ github.event.number }}
          if git diff --cached --quiet; then
            echo "No preview files to remove"
            exit 0
          fi
          git commit -m "Remove PR #${{ github.event.number }} preview"
          git push origin HEAD:gh-pages
      - name: Mark preview as removed on PR
        uses: actions/github-script@v7
        with:
          script: |
            const marker = '<!-- pr-preview-url -->'
            const previewUrl = `https://a11yhood.org/pr-preview/${context.payload.pull_request.number}/`
            const body = `${marker}\nPreview removed (PR closed): ${previewUrl}`

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
              per_page: 100,
            })

            const existing = comments.find(
              (comment) => comment.user?.type === 'Bot' && comment.body?.includes(marker)
            )

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              })
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.payload.pull_request.number,
                body,
              })
            }

