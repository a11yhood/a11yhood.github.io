name: PR Preview

on:
  pull_request:
    types: [opened, synchronize, reopened, closed]

concurrency:
  group: pr-preview-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  lint:
    if: github.event.action != 'closed'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Run lint
        run: npm run lint

  build:
    if: github.event.action != 'closed'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: prefix-dev/setup-pixi@v0.8.8
      - name: Run tests
        env:
          TEST_BACKEND_URL: ${{ secrets.VITE_API_URL_PREVIEW }}
          VITEST_DEV_DB_RESET_MODE: never
        run: pixi run test
      - name: Build for GitHub Pages
        env:
          # PR previews must use isolated preview services, never production.
          VITE_API_URL: ${{ secrets.VITE_API_URL_PREVIEW }}
          VITE_DEV_MODE: "false"
          VITE_ENV: development
          VITE_LOG_LEVEL: debug
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL_PREVIEW }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY_PREVIEW }}
          VITE_BASE_URL: /pr-preview/${{ github.event.number }}/
        run: pixi run build-vite

      - uses: actions/upload-artifact@v5
        with:
          name: vite-site-${{ github.event.number }}
          path: dist/

  deploy-preview:
    # Security hold: public PR preview publishing is intentionally disabled.
    # Keep lint/test/build checks active in this workflow.
    if: false
    needs: build
    runs-on: ubuntu-latest
    env:
      PREVIEW_URL: https://a11yhood.org/pr-preview/${{ github.event.number }}/
    steps:
      - name: Checkout gh-pages branch
        uses: actions/checkout@v5
        with:
          ref: gh-pages
          path: gh-pages-branch
          fetch-depth: 1
          persist-credentials: false

      - name: Clear existing preview directory
        run: rm -rf gh-pages-branch/pr-preview/${{ github.event.number }}

      - name: Download PR build
        uses: actions/download-artifact@v5
        with:
          name: vite-site-${{ github.event.number }}
          path: /tmp/pr-build/

      - name: Place build in preview directory
        run: |
          mkdir -p gh-pages-branch/pr-preview/${{ github.event.number }}
          if [ -d /tmp/pr-build/dist ]; then
            cp -r /tmp/pr-build/dist/. gh-pages-branch/pr-preview/${{ github.event.number }}/
          else
            cp -r /tmp/pr-build/. gh-pages-branch/pr-preview/${{ github.event.number }}/
          fi

      - name: Commit preview to gh-pages
        env:
          GH_PAGES_PUSH_PAT: ${{ secrets.GH_PAGES_PUSH_PAT }}
        run: |
          cd gh-pages-branch
          if [ -z "$GH_PAGES_PUSH_PAT" ]; then
            echo "Missing required secret: GH_PAGES_PUSH_PAT"
            exit 1
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git remote set-url origin "https://x-access-token:${GH_PAGES_PUSH_PAT}@github.com/${{ github.repository }}.git"
          git add -A pr-preview/${{ github.event.number }}/
          if git diff --cached --quiet; then
            echo "Nothing to commit, preview is already up to date"
          else
            git commit -m "Deploy PR #${{ github.event.number }} preview"
            git push
          fi

      - name: Add preview URL to workflow summary
        run: |
          echo "### PR Preview" >> "$GITHUB_STEP_SUMMARY"
          echo "${PREVIEW_URL}" >> "$GITHUB_STEP_SUMMARY"

      - name: Comment preview URL on PR
        uses: actions/github-script@v7
        with:
          script: |
            const marker = '<!-- pr-preview-url -->';
            const body = `${marker}\nPR preview is ready: ${process.env.PREVIEW_URL}`;
            const { owner, repo } = context.repo;
            const issue_number = context.issue.number;

            const comments = await github.paginate(github.rest.issues.listComments, {
              owner,
              repo,
              issue_number,
              per_page: 100,
            });

            const existing = comments.find(
              (comment) =>
                comment.user?.type === 'Bot' &&
                typeof comment.body === 'string' &&
                comment.body.includes(marker)
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number,
                body,
              });
            }

  cleanup:
    # Disabled while preview publishing is off.
    if: false
    runs-on: ubuntu-latest
    steps:
      - name: Checkout gh-pages branch
        uses: actions/checkout@v5
        with:
          ref: gh-pages
          path: gh-pages-branch
          fetch-depth: 1
          persist-credentials: false

      - name: Remove PR preview directory
        env:
          GH_PAGES_PUSH_PAT: ${{ secrets.GH_PAGES_PUSH_PAT }}
        run: |
          cd gh-pages-branch
          if [ -z "$GH_PAGES_PUSH_PAT" ]; then
            echo "Missing required secret: GH_PAGES_PUSH_PAT"
            exit 1
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git remote set-url origin "https://x-access-token:${GH_PAGES_PUSH_PAT}@github.com/${{ github.repository }}.git"
          REMOVED_PREVIEW=0
          if [ -d "pr-preview/${{ github.event.number }}" ]; then
            git rm -rf "pr-preview/${{ github.event.number }}/"
            REMOVED_PREVIEW=1
          fi
          if git diff --cached --quiet; then
            echo "No preview directory found, nothing to remove"
          else
            if [ "$REMOVED_PREVIEW" -eq 1 ]; then
              COMMIT_MSG="Remove PR #${{ github.event.number }} preview"
            else
              COMMIT_MSG="Update gh-pages metadata"
            fi
            git commit -m "$COMMIT_MSG"
            git push
          fi

  accessibility_scanner:
    name: A11y Preview Scan (PR)
    needs: build
    runs-on: ubuntu-latest
    if: github.event.action != 'closed'
    steps:
      - name: Determine scanner eligibility
        id: scanner_gate
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          if [ "${{ github.event.pull_request.head.repo.full_name }}" != "${{ github.repository }}" ]; then
            echo "can_scan=false" >> "$GITHUB_OUTPUT"
            echo "skip_reason=fork-pr" >> "$GITHUB_OUTPUT"
          elif [ -z "$GH_TOKEN" ]; then
            echo "can_scan=false" >> "$GITHUB_OUTPUT"
            echo "skip_reason=missing-token" >> "$GITHUB_OUTPUT"
          else
            echo "can_scan=true" >> "$GITHUB_OUTPUT"
            echo "skip_reason=none" >> "$GITHUB_OUTPUT"
          fi

      - name: Download PR build
        if: ${{ steps.scanner_gate.outputs.can_scan == 'true' }}
        uses: actions/download-artifact@v5
        with:
          name: vite-site-${{ github.event.number }}
          path: /tmp/pr-build/

      - name: Serve preview artifact locally
        if: ${{ steps.scanner_gate.outputs.can_scan == 'true' }}
        env:
          PREVIEW_SUBPATH: pr-preview/${{ github.event.number }}
        run: |
          mkdir -p "/tmp/scan-site/${PREVIEW_SUBPATH}"
          if [ -d /tmp/pr-build/dist ]; then
            cp -r /tmp/pr-build/dist/. "/tmp/scan-site/${PREVIEW_SUBPATH}/"
          else
            cp -r /tmp/pr-build/. "/tmp/scan-site/${PREVIEW_SUBPATH}/"
          fi
          python3 -m http.server 4173 --directory /tmp/scan-site >/tmp/scan-http.log 2>&1 &
          for i in $(seq 1 30); do
            if curl -sf "http://127.0.0.1:4173/${PREVIEW_SUBPATH}/" >/dev/null; then
              exit 0
            fi
            sleep 1
          done
          echo "Timed out waiting for local preview server"
          cat /tmp/scan-http.log || true
          exit 1

      - name: Run accessibility scanner
        if: ${{ steps.scanner_gate.outputs.can_scan == 'true' }}
        uses: github/accessibility-scanner@v2
        with:
          urls: |
            http://127.0.0.1:4173/pr-preview/${{ github.event.number }}/
          repository: a11yhood/a11yhood.github.io
          token: ${{ secrets.GH_TOKEN }}
          cache_key: a11yhood.org-pr-${{ github.event.number }}

      - name: Skip scanner for fork PRs without secret access
        if: ${{ steps.scanner_gate.outputs.can_scan != 'true' }}
        run: |
          if [ "${{ steps.scanner_gate.outputs.skip_reason }}" = "fork-pr" ]; then
            echo "Accessibility scanner skipped: fork PRs cannot access repository secrets."
          elif [ "${{ steps.scanner_gate.outputs.skip_reason }}" = "missing-token" ]; then
            echo "Accessibility scanner skipped: GH_TOKEN is not configured for this repository."
          else
            echo "Accessibility scanner skipped."
          fi
          echo "Accessibility remains enforced by in-repo a11y test suites in CI."
