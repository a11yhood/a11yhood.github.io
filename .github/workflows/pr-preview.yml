name: PR Preview

on:
  pull_request:
    types: [opened, synchronize, reopened, closed]

concurrency:
  group: pr-preview-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  contents: write
  issues: write

jobs:
  build:
    if: github.event.action != 'closed'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: prefix-dev/setup-pixi@v0.8.8
      - name: Run tests
        env:
          CI: true
        run: pixi run test
      - name: Build for GitHub Pages
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL }}
          VITE_DEV_MODE: ${{ secrets.VITE_DEV_MODE }}
          VITE_ENV: ${{ secrets.VITE_ENV }}
          VITE_LOG_LEVEL: ${{ secrets.VITE_LOG_LEVEL }}
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          VITE_BASE_URL: /draft/${{ github.event.number }}/
        run: pixi run build-vite

      - uses: actions/upload-artifact@v4
        with:
          name: vite-site-${{ github.event.number }}
          path: dist/

  deploy-preview:
    if: github.event.action != 'closed'
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: gh-pages
          fetch-depth: 0
      - uses: actions/download-artifact@v4
        with:
          name: vite-site-${{ github.event.number }}
          path: .preview-dist
      - name: Update preview files
        run: |
          rm -rf draft/${{ github.event.number }}
          mkdir -p draft/${{ github.event.number }}
          cp -R .preview-dist/. draft/${{ github.event.number }}/
      - name: Commit and push preview
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A draft/${{ github.event.number }}
          if git diff --cached --quiet; then
            echo "No preview changes to commit"
            exit 0
          fi
          git commit -m "Deploy PR #${{ github.event.number }} preview"
          git push origin HEAD:gh-pages
      - name: Comment preview URL on PR
        uses: actions/github-script@v7
        with:
          script: |
            const marker = '<!-- pr-preview-link -->'
            const previewUrl = `https://a11yhood.org/draft/${context.payload.pull_request.number}/`
            const body = `${marker}\nPreview ready: ${previewUrl}`

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
              per_page: 100,
            })

            const existing = comments.find(
              (comment) => comment.user?.type === 'Bot' && comment.body?.includes(marker)
            )

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              })
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.payload.pull_request.number,
                body,
              })
            }

  cleanup-preview:
    if: github.event.action == 'closed'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: gh-pages
          fetch-depth: 0
      - name: Remove preview files
        run: rm -rf draft/${{ github.event.number }}
      - name: Commit and push cleanup
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A draft/${{ github.event.number }}
          if git diff --cached --quiet; then
            echo "No preview files to remove"
            exit 0
          fi
          git commit -m "Remove PR #${{ github.event.number }} preview"
          git push origin HEAD:gh-pages
      - name: Mark preview as removed on PR
        uses: actions/github-script@v7
        with:
          script: |
            const marker = '<!-- pr-preview-link -->'
            const previewUrl = `https://a11yhood.org/draft/${context.payload.pull_request.number}/`
            const body = `${marker}\nPreview removed (PR closed): ${previewUrl}`

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
              per_page: 100,
            })

            const existing = comments.find(
              (comment) => comment.user?.type === 'Bot' && comment.body?.includes(marker)
            )

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              })
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.payload.pull_request.number,
                body,
              })
            }
