name: Publish Pages

# Triggered on any push to the gh-pages branch and by manual dispatch.
# Preview deploy/cleanup jobs are the primary source of those gh-pages pushes,
# while production releases publish directly from production-release.yml.
on:
  push:
    branches:
      - gh-pages
  # Allow manual re-deploys (e.g. after environment config changes).
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout gh-pages branch
        uses: actions/checkout@v5
        with:
          ref: gh-pages
          fetch-depth: 1

      - name: Upload site as Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
