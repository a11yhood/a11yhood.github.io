name: Full Test Suite (with backend)

on:
  pull_request:
    branches:
      - main
    types: [opened, reopened, ready_for_review, synchronize, labeled]

  workflow_dispatch:
    inputs:
      ref:
        description: 'Branch, tag, or SHA to test'
        required: false
        default: ''

permissions:
  contents: read
  issues: write

jobs:
  test-with-backend:
    runs-on: ubuntu-latest
    env:
      FULL_BACKEND_TRIGGER_LABEL: run-full-backend
    steps:
      - name: Reset manual trigger label on new commits
        if: ${{ github.event_name == 'pull_request' && github.event.action == 'synchronize' }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          status_code=$(curl -sS -o /dev/null -w "%{http_code}" \
            -X DELETE \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${{ github.repository }}/issues/${{ github.event.pull_request.number }}/labels/${FULL_BACKEND_TRIGGER_LABEL}")

          if [ "$status_code" = "200" ] || [ "$status_code" = "204" ] || [ "$status_code" = "404" ]; then
            echo "Trigger label reset status: ${status_code}"
          else
            echo "Failed to reset trigger label (HTTP ${status_code})"
            exit 1
          fi

      - name: Enforce manual trigger label on PRs
        if: ${{ github.event_name == 'pull_request' }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          labels_json=$(curl -sS \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${{ github.repository }}/issues/${{ github.event.pull_request.number }}/labels")

          if ! echo "$labels_json" | jq -e --arg trigger "$FULL_BACKEND_TRIGGER_LABEL" '.[] | select(.name == $trigger)' >/dev/null; then
            echo "Required check is manually triggered."
            echo "Add label '${FULL_BACKEND_TRIGGER_LABEL}' to this PR to run the full backend suite."
            exit 1
          fi

      - name: Checkout code
        uses: actions/checkout@v5
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && (inputs.ref || github.ref) || github.ref }}

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: |
          npm ci
          npm install --no-save @rollup/rollup-linux-x64-gnu @swc/core-linux-x64-gnu

      - name: Validate backend-test CI configuration
        env:
          TEST_BACKEND_URL: ${{ secrets.VITE_API_URL_PREVIEW }}
          TEST_RUN_TOKEN: ${{ secrets.TEST_RUN_TOKEN }}
        run: |
          if [ -z "$TEST_BACKEND_URL" ]; then
            echo "Missing repository secret VITE_API_URL_PREVIEW"
            exit 1
          fi

          if [ -z "$TEST_RUN_TOKEN" ]; then
            echo "Missing repository secret TEST_RUN_TOKEN"
            exit 1
          fi

          if ! echo "$TEST_BACKEND_URL" | grep -qi 'backend-test'; then
            echo "Refusing to run full backend suite against non-test backend URL: $TEST_BACKEND_URL"
            exit 1
          fi

      - name: Run full test suite (including backend tests)
        env:
          TEST_BACKEND_URL: ${{ secrets.VITE_API_URL_PREVIEW }}
          VITEST_DEV_DB_RESET_MODE: always
          TEST_RUN_TOKEN: ${{ secrets.TEST_RUN_TOKEN }}
        run: npm run test:run:full
