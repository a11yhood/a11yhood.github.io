name: Production Release

on:
  # Only deploy production when a version tag is pushed (e.g. v1.2.3).
  # This acts as a deliberate quality gate: you create the tag after
  # verifying the build is ready for production.
  push:
    tags:
      - "v*"
  # Allow manual re-deploys (e.g. after environment config changes).
  workflow_dispatch:

permissions:
  contents: write # Needed to commit updated production build to gh-pages branch
  pages: write # Needed to publish the assembled site to GitHub Pages
  id-token: write # Required by actions/deploy-pages

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Ensure release tag points to main
        if: ${{ github.event_name == 'push' && startsWith(github.ref, 'refs/tags/') }}
        run: |
          git fetch --no-tags origin main
          if ! git merge-base --is-ancestor "$GITHUB_SHA" "origin/main"; then
            echo "Tag ${GITHUB_REF_NAME} is not reachable from origin/main; refusing production release."
            exit 1
          fi

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: |
          npm ci
          npm install --no-save @rollup/rollup-linux-x64-gnu @swc/core-linux-x64-gnu

      - name: Validate Supabase URL/key pairing
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
        run: |
          node -e "
            const url = (process.env.VITE_SUPABASE_URL || '').trim();
            const key = (process.env.VITE_SUPABASE_ANON_KEY || '').trim();
            if (!url || !key) {
              console.error('Missing VITE_SUPABASE_URL or VITE_SUPABASE_ANON_KEY');
              process.exit(1);
            }

            const normalizedUrl = url.replace(/\/$/, '');

            // Validate via a real auth endpoint so both JWT and non-JWT key
            // formats are supported (Supabase may issue either format).
            const endpoint = normalizedUrl + '/auth/v1/settings';

            fetch(endpoint, {
              headers: {
                apikey: key,
                Authorization: 'Bearer ' + key,
              },
            }).then(async (res) => {
              if (!res.ok) {
                const body = await res.text().catch(() => '');
                console.error('Supabase URL/key validation failed.');
                console.error('Endpoint:', endpoint);
                console.error('Status:', res.status, res.statusText);
                console.error('Body:', body.slice(0, 500));
                process.exit(1);
              }
              console.log('Supabase URL/key pair looks consistent.');
            }).catch((err) => {
              console.error('Supabase URL/key validation request failed:', err);
              process.exit(1);
            });
          "

      - name: Run tests
        env:
          TEST_BACKEND_URL: ${{ secrets.VITE_API_URL_PREVIEW }}
          VITEST_DEV_DB_RESET_MODE: always
        run: npm run test:run:full

      - name: Set app version from tag
        if: startsWith(github.ref, 'refs/tags/')
        run: echo "VITE_APP_VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_ENV

      - name: Build for GitHub Pages
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL }}
          VITE_DEV_MODE: ${{ secrets.VITE_DEV_MODE }}
          VITE_LOG_LEVEL: ${{ secrets.VITE_LOG_LEVEL }}
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
        run: npm run build:ghpages:ci

      - name: Upload production build artifact
        uses: actions/upload-artifact@v5
        with:
          name: production-build
          path: dist/

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout trusted merge script source
        uses: actions/checkout@v5
        with:
          repository: ${{ github.repository }}
          ref: ${{ github.sha }}
          path: trusted-workflow-source
          sparse-checkout: |
            scripts/merge-pages-root.sh
          sparse-checkout-cone-mode: false
          persist-credentials: false

      - name: Checkout gh-pages branch
        uses: actions/checkout@v5
        with:
          ref: gh-pages
          path: gh-pages-branch
          fetch-depth: 1

      - name: Download production build
        uses: actions/download-artifact@v5
        with:
          name: production-build
          path: ${{ runner.temp }}/new-production/

      - name: Debug downloaded production artifact
        run: |
          echo "Downloaded artifact layout (top 3 levels):"
          find "${RUNNER_TEMP}/new-production" -maxdepth 3 -print | sort

      # Replace all root content with the new production build while preserving
      # preview subdirectories (legacy draft/ and current pr-preview/).
      - name: Merge production build into gh-pages root
        run: |
          cd gh-pages-branch
          ARTIFACT_ROOT="${RUNNER_TEMP}/new-production"

          if [ -d "${ARTIFACT_ROOT}/dist" ]; then
            BUILD_SOURCE="${ARTIFACT_ROOT}/dist/"
          else
            BUILD_SOURCE="${ARTIFACT_ROOT}/"
          fi

          echo "Selected BUILD_SOURCE=${BUILD_SOURCE}"

          chmod +x ../trusted-workflow-source/scripts/merge-pages-root.sh
          ../trusted-workflow-source/scripts/merge-pages-root.sh "${BUILD_SOURCE}" .

          rm -rf "${ARTIFACT_ROOT}"

      # Keep gh-pages as the canonical assembled site so PR previews continue
      # to merge against the latest production root.
      - name: Commit updated production to gh-pages
        run: |
          cd gh-pages-branch
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "Nothing to commit, production is already up to date"
          else
            git commit -m "Deploy production ${{ github.ref_name }}"
            git push
          fi

      - name: Stage assembled site for Pages upload
        run: |
          STAGING_DIR="${RUNNER_TEMP}/pages-artifact"
          rm -rf "${STAGING_DIR}"
          mkdir -p "${STAGING_DIR}"
          rsync -a --delete --exclude='.git' gh-pages-branch/ "${STAGING_DIR}/"

      # Publish directly from this workflow because gh-pages pushes performed
      # with GITHUB_TOKEN do not trigger follow-up workflows reliably.
      - name: Upload assembled site as Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          name: github-pages-${{ github.run_id }}-${{ github.run_attempt }}
          path: ${{ runner.temp }}/pages-artifact

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
        with:
          artifact_name: github-pages-${{ github.run_id }}-${{ github.run_attempt }}
#
