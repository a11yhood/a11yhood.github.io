name: Publish GitHub Pages

# Triggered whenever gh-pages branch is updated — either by a production
# release (deploy.yml) or a PR preview commit/cleanup (pr-preview.yml).
# Running from the gh-pages branch satisfies the github-pages environment
# protection rules that block deployments from PR merge refs.
on:
  push:
    branches:
      - gh-pages
  # Allow manual re-deploys (e.g. after environment config changes).
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout gh-pages branch
        uses: actions/checkout@v4
        with:
          ref: gh-pages
          fetch-depth: 1

      - name: Upload site as Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
