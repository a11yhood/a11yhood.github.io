<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Page Not Found</title>
  <script>
    // Single Page Apps for GitHub Pages
    // MIT License
    // https://github.com/rafgraph/spa-github-pages
    // This script takes the current url and converts the path and query
    // string into just a query string, and then redirects the browser
    // to the new url with only a query string and hash fragment
    
    // For PR preview paths (/pr-preview/N/...) keep the first 2 path
    // segments so the redirect lands on the PR preview's own index.html
    // rather than the root index.html (main site).
    var parts = window.location.pathname.split('/');
    var pathSegmentsToKeep = (parts[1] === 'pr-preview' && parts[2]) ? 2 : 0;
    
    var l = window.location;
    var basePath = l.pathname.split('/').slice(0, 1 + pathSegmentsToKeep).join('/') + '/';
    var routePayload = l.pathname.slice(1).split('/').slice(pathSegmentsToKeep).join('/');
    var searchPayload = l.search ? l.search.slice(1) : '';

    // If the search payload begins with '/' it contains previously-encoded redirect
    // data (written by a prior run of this script). That means the redirect target
    // does not exist and re-encoding would grow the URL on every request, eventually
    // causing an HTTP 414 URI Too Long error. Fall through to render the 404 body.
    var inLoop = searchPayload.charAt(0) === '/';

    // Nothing to redirect: no route segment and no query to carry over.
    // Redirecting here would only append '?/' to the URL and loop indefinitely
    // when the base page itself does not exist (e.g. a removed PR preview).
    var isEmptyRedirect = !routePayload && !searchPayload;

    if (!inLoop && !isEmptyRedirect) {
      var encodedRoute = encodeURIComponent(routePayload);
      var encodedSearch = encodeURIComponent(searchPayload);
      var redirectPath = basePath + '?/' + encodedRoute + (searchPayload ? '&' + encodedSearch : '');
      var target = l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') + redirectPath + l.hash;

      // Guard against self-redirect loops (e.g. /pr-preview/331/?/%2F%26...).
      // If the computed target is identical, fall back to the canonical base path.
      if (target === l.href) {
        target = l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') + basePath + l.hash;
      }

      if (target !== l.href) {
        l.replace(target);
      }
    }
  </script>
  <style>
    body { font-family: sans-serif; color: #111; background: #fff; text-align: center; padding: 3rem 1rem; }
    h1 { font-size: 2rem; margin-bottom: 0.5rem; }
    p  { margin-bottom: 1rem; }
    a  { color: #0060df; text-decoration: underline; }
    a:focus { outline: 3px solid #0060df; outline-offset: 2px; }
    @media (prefers-color-scheme: dark) {
      body { color: #f9f9fa; background: #1c1b22; }
      a    { color: #80cbff; }
      a:focus { outline-color: #80cbff; }
    }
  </style>
</head>
<body>
  <main>
    <h1>Page Not Found</h1>
    <p>The page you are looking for does not exist or has been removed.</p>
    <a href="/">Return to home</a>
  </main>
</body>
</html>
