<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="color-scheme" content="light dark">
  <title>Redirecting...</title>
  <style>
    :root {
      color-scheme: light dark;
    }

    body {
      margin: 0;
      font-family: Inter, system-ui, sans-serif;
      line-height: 1.5;
    }

    main {
      min-height: 100vh;
      display: grid;
      place-content: center;
      gap: 0.75rem;
      padding: 1.5rem;
      text-align: center;
    }
  </style>
</head>
<body>
  <main>
    <h1>Redirecting to a11yhood…</h1>
    <p>If you are not redirected automatically, use the link below.</p>
    <p><a id="redirect-link" href="/">Continue to a11yhood</a></p>
  </main>
  <script>
    // Single Page Apps for GitHub Pages
    // MIT License
    // https://github.com/rafgraph/spa-github-pages
    // This script takes the current url and converts the path and query
    // string into just a query string, and then redirects the browser
    // to the new url with only a query string and hash fragment

    // For PR preview paths (/pr-preview/N/...) keep the first 2 path
    // segments so the redirect lands on the PR preview's own index.html
    // rather than the root index.html (main site).
    var parts = window.location.pathname.split('/');
    var pathSegmentsToKeep = (parts[1] === 'pr-preview' && parts[2]) ? 2 : 0;

    var l = window.location;
    var basePath = l.pathname.split('/').slice(0, 1 + pathSegmentsToKeep).join('/') + '/';
    var redirectLink = document.getElementById('redirect-link');
    // Stay well below common 2 KB URI limits and leave room for the protocol,
    // host, PR preview prefix, and percent-encoding overhead.
    var maxRedirectPathLength = 1800;

    if (redirectLink) {
      redirectLink.setAttribute('href', basePath);
    }

    var routePayload = l.pathname.slice(1).split('/').slice(pathSegmentsToKeep).join('/');
    var searchPayload = l.search ? l.search.slice(1) : '';
    var encodedRoute = encodeURIComponent(routePayload);
    var encodedSearch = encodeURIComponent(searchPayload);
    var redirectPath = basePath + '?/' + encodedRoute + (searchPayload ? '&' + encodedSearch : '');
    var target = l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') + redirectPath + l.hash;
    var isSelfRedirect = target === l.href;
    var isAlreadyRedirected = l.search.indexOf('?/') === 0;
    var isOversizedRedirect = redirectPath.length > maxRedirectPathLength;

    // Guard against self-redirect loops (e.g. /pr-preview/331/?/%2F%26...)
    // and oversized redirect payloads that can trigger "URI Too Long" responses.
    // A search string starting with "?/" indicates the redirect payload is
    // already present in the URL and should collapse back to the base path.
    // In those cases, fall back to the canonical base path for the site/preview.
    if (isSelfRedirect || isAlreadyRedirected || isOversizedRedirect) {
      target = l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') + basePath + l.hash;
    }

    if (target !== l.href) {
      l.replace(target);
    }
  </script>
</body>
</html>
